services:
  mysql:
    image: mysql:8.0
    container_name: sportify_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sportify}
      MYSQL_USER: ${MYSQL_USER:-sportify}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sportify}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - sportify_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: sportify_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      UPLOAD_LIMIT: 64M
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sportify_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sportify_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: "mysql://${MYSQL_USER:-sportify}:${MYSQL_PASSWORD:-sportify}@mysql:3306/${MYSQL_DATABASE:-sportify}"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sportify_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    container_name: sportify_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend
    networks:
      - sportify_network

volumes:
  mysql_data:
    driver: local

networks:
  sportify_network:
    driver: bridge
